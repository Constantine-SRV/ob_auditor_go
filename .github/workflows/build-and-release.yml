name: Build and Release

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Build command'
        required: true
        default: 'build-release'
        type: choice
        options:
          - build-release

permissions:
  contents: write

env:
  APP_NAME: obauditor
  RELEASE_TAG: latest_release

jobs:

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -o obauditor.exe ./cmd/obauditor

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: obauditor.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -o obauditor ./cmd/obauditor

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: obauditor

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-bin
          path: artifacts/linux

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            gh release delete "${{ env.RELEASE_TAG }}" --yes --cleanup-tag
          fi
          git tag -d "${{ env.RELEASE_TAG }}" >/dev/null 2>&1 || true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            artifacts/windows/obauditor.exe \
            artifacts/linux/obauditor \
            --title "Release ${{ env.RELEASE_TAG }}" \
            --notes "Windows + Linux build from commit ${GITHUB_SHA}" \
            --target "${GITHUB_SHA}"